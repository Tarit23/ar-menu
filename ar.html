<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Vision | Gourmet AR</title>
    <!-- A-Frame and AR.js libraries -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .ar-ui {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            pointer-events: none;
        }

        .ar-btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 1rem 2rem;
            border-radius: 100px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: bold;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .ar-btn:hover {
            background: white;
            color: black;
        }

        .status-msg {
            background: rgba(255, 166, 0, 0.9);
            color: black;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <!-- AR UI Overlay -->
    <div class="ar-ui">
        <div id="status" class="status-msg">Searching for Hiro Marker...</div>
        <a href="index.html" class="ar-btn">Back to Menu</a>
    </div>

    <!-- AR Scene -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:720; displayWidth: 1280; displayHeight: 720; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; precision: medium;"
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <!-- Preload models to ensure they are ready -->
            <a-asset-item id="burger-model" src="burger.glb"></a-asset-item>
            <a-asset-item id="pizza-model" src="pizza.glb"></a-asset-item>
        </a-assets>

        <!-- Hiro Marker -->
        <a-marker preset="hiro" id="marker" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <!-- Debug Box: Helps confirm the marker is detected even if the model fails to load -->
            <a-box position="0 0.5 0" material="opacity: 0.5; color: #4ade80;" scale="0.2 0.2 0.2" 
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>

            <a-entity 
                id="model-entity"
                position="0 0.1 0" 
                scale="1 1 1"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"
            >
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const modelType = urlParams.get('model') || 'burger';
        const modelEntity = document.querySelector('#model-entity');
        const statusMsg = document.querySelector('#status');

        // Set the model source based on parameter
        if (modelType === 'pizza') {
            modelEntity.setAttribute('gltf-model', '#pizza-model');
            modelEntity.setAttribute('scale', '0.8 0.8 0.8'); // Pizza scale
        } else {
            modelEntity.setAttribute('gltf-model', '#burger-model');
            modelEntity.setAttribute('scale', '0.015 0.015 0.015'); // Recalibrated burger scale
        }

        // Add error logging for models
        modelEntity.addEventListener('model-error', (e) => {
            console.error('Model failed to load:', e);
            statusMsg.textContent = 'Error loading 3D model.';
            statusMsg.style.background = '#ef4444';
        });

        // Marker detection feedback
        const marker = document.querySelector('#marker');
        marker.addEventListener('markerFound', () => {
            statusMsg.textContent = `Dish Detected (${modelType.toUpperCase()})!`;
            statusMsg.style.background = '#4ade80';
        });

        marker.addEventListener('markerLost', () => {
            statusMsg.textContent = 'Searching for Hiro Marker...';
            statusMsg.style.background = 'rgba(255, 166, 0, 0.9)';
        });
    </script>
</body>
</html>
