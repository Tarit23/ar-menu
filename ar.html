<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D View | Gourmet AR</title>
    <!-- Google Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    <style>
        :root {
            --accent: #4ade80;
        }

        body {
            margin: 0;
            background-color: #05070a;
            font-family: sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #05070a;
            --poster-color: transparent;
        }

        .ar-overlay {
            position: fixed;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 100px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 600;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #ar-button {
            background-image: url(https://modelviewer.dev/assets/ic_view_in_ar_new_googblue_48dp.png);
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #fff;
            color: #4285f4;
            border-radius: 100px;
            border: none;
            padding: 0.8rem 1.2rem 0.8rem 40px;
            font-weight: 600;
            font-size: 0.9rem;
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        #ar-button:active {
            transform: translateX(-50%) scale(0.95);
        }

        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            opacity: 0.6;
            text-align: center;
        }

        #status {
            position: fixed;
            bottom: 5rem;
            width: 100%;
            text-align: center;
            color: var(--accent);
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="ar-overlay">
        <a href="index.html" class="btn-back">← Back to Menu</a>
    </div>

    <div class="loader" id="loading-text">Preparing ingredients...</div>
    <div id="status">3D Preview Mode</div>

    <!-- The Model Viewer -->
    <model-viewer 
        id="mv"
        src=""
        ar
        ar-modes="scene-viewer quick-look webxr"
        camera-controls
        auto-rotate
        shadow-intensity="1.5"
        shadow-softness="0.5"
        environment-image="neutral"
        exposure="1.2"
        alt="A 3D model of a signature dish"
    >
        <button slot="ar-button" id="ar-button">
            VIEW ON YOUR TABLE
        </button>
    </model-viewer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const modelType = urlParams.get('model') || 'burger';
        const mv = document.querySelector('#mv');
        const loadingText = document.querySelector('#loading-text');

        // Set the correct model source
        const modelFile = modelType === 'pizza' ? 'pizza.glb' : 'burger.glb';
        mv.setAttribute('src', modelFile);

        // Hide loading text when model is loaded
        mv.addEventListener('load', () => {
            loadingText.style.display = 'none';
        });

        // Specific adjustments for burger vs pizza
        if (modelType === 'pizza') {
            mv.setAttribute('camera-orbit', '45deg 75deg 105%');
        } else {
            mv.setAttribute('camera-orbit', '45deg 75deg 100%');
        }
    </script>
</body>
</html>
