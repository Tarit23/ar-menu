<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Launch AR | Gourmet AR</title>
    <!-- Google Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    <style>
        :root {
            --accent: #4ade80;
            --bg: #05070a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* The Launch Pad UI */
        .launcher-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #111827 0%, var(--bg) 100%);
            z-index: 100;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .dish-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .instruction {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 3rem;
            max-width: 300px;
        }

        .btn-launch-ar {
            width: 80vw;
            max-width: 350px;
            padding: 1.5rem;
            background: linear-gradient(135deg, #ff8c00, #ff3e3e);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 20px 40px rgba(255, 62, 62, 0.3);
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-back {
            margin-top: 2rem;
            color: #4b5563;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
        }

        /* Hidden Model Viewer - We only use its AR engine */
        model-viewer {
            width: 1px;
            height: 1px;
            opacity: 0;
            position: absolute;
            pointer-events: none;
        }

        /* Loader Overlay */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="loader">Loading Vision Engine...</div>

    <div class="launcher-ui">
        <h1 class="dish-title" id="dish-name">Signature Dish</h1>
        <p class="instruction">Scan your table and watch your meal appear in life-size AR.</p>
        
        <button class="btn-launch-ar" id="trigger-ar">
            ACTIVATE AR CAMERA
        </button>

        <a href="index.html" class="btn-back">Cancel & Go Back</a>
    </div>

    <!-- The Hidden Engine -->
    <model-viewer 
        id="mv-engine"
        src=""
        ar
        ar-modes="scene-viewer webxr quick-look"
        camera-controls
    ></model-viewer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const modelType = urlParams.get('model') || 'burger';
        const engine = document.querySelector('#mv-engine');
        const dishName = document.querySelector('#dish-name');
        const triggerBtn = document.querySelector('#trigger-ar');
        const loader = document.querySelector('#loader');

        // Setup the specific dish
        if (modelType === 'pizza') {
            dishName.textContent = "Gourmet Pizza";
            engine.setAttribute('src', 'pizza.glb');
        } else {
            dishName.textContent = "Luxury Burger";
            engine.setAttribute('src', 'burger.glb');
        }

        // Hide loader when the AR system is ready
        engine.addEventListener('load', () => {
            loader.style.display = 'none';
        });

        // THE FORCE-AR LOGIC
        // This is the only way to bypass the "3D Look"
        triggerBtn.addEventListener('click', () => {
            // Attempt to activate the native AR camera immediately
            // This is the professional trigger for Scene Viewer
            engine.activateAR();
            
            // Log for debugging
            console.log("Attempting to force-launch AR camera...");
        });

        // Auto-launch attempt (some browsers allow it if it's the first user gesture)
        window.addEventListener('click', () => {
             // If they click anywhere else, try to launch too
             if (!engine.arStatus === 'not-presenting') {
                 engine.activateAR();
             }
        }, {once: true});
    </script>
</body>
</html>
